{% load widget_tweaks %}
{% load static %}


<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5x sticky-top">
    <div class="container px-5">
        <h1><a class="navbar-brand fs-3 fw-bold" href="{% url 'home' %}">Rent-House</a></h1>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link {% if request.path == '/' %} active{% endif %}" aria-current="page" href="{% url 'home' %}">Accueil</a></li>
                <li class="nav-item"><a class="nav-link {% if request.path == '/les-maisons/' %}active{% endif %}" href="{% url 'houses' %}">Maisons</a></li>
                <li class="nav-item"><a class="nav-link {% if request.path == '/mes-reservations/' %}active{% endif %}" href="{% url 'mes-reservations' %}">Mes reservations</a></li>
                <li class="nav-item"><a class="nav-link {% if request.path == '/activites/' %}active{% endif %}" href="{% url 'activities' %}">Activites</a></li>

                <div class="d-flex ps-4 align-items-center justify-content-evenly " >

                    {% if user.is_authenticated == True %}
                        <img src="{{ user.image.url }}" height="38" width="38" class="me-2 rounded-5">
                        <h3 class="text-warning my-auto">
                            {{ user.name }}
                        </h3>
                        <form class="" action="{% url 'logout' %}?next={{ request.path }}" method="post">
                            {% csrf_token %}
                            <input type="submit" class="btn bg-danger bg-opacity-75 text-white px-3 ms-3" value="Deconnexion">
                        </form>
                    {% else %}


                        <a href="{% url 'login' %}?next={{ request.path }}" class="btn bg-primary bg-opacity-75 fw-500 text-white px-3 ms-3">Se connecter</a>
                    {% endif %}
                </div>
            </ul>
        </div>

    </div>
</nav>
