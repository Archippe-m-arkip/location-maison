
{% extends 'appLocation/master.html' %}

    {% block title %}
        Login
    {% endblock %}

    {% block content %}
        <h2>Connexion</h2>
           <form method="post" action="{{ home }}" style="padding: 0px 20px; space-y:5px">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">S'incrire</button>
        </form>
            <p>Pas encore inscrit ? <a href="{% url 'sign_up_user' %}">Inscrivez-vous ici</a></p>
    {% endblock %}
